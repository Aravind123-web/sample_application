# This is a basic configuration for an EKS cluster using eksctl. It defines a cluster named "expense-1" in the "us-east-1" region with a managed node group called "expense" that uses m5.large instances and has a desired capacity of 3 nodes, utilizing spot instances for cost efficiency.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: expense-1
  region: us-east-1

managedNodeGroups:
  - name: expense
    instanceType: m5.large
    desiredCapacity: 3
    spot: true